version: 1
defaults:
  date_format: "%Y-%m-%d"
  time_format: "%H:%M"

rules:
  # Пример групповой проверки "Да*" сразу для нескольких колонок.
  # Раскомментируйте, если хотите заменить однотипные одиночные правила.
  # - id: групповые вопросы значение да
  #   description: Набор вопросов должен иметь только значение формата Да*
  #   type: text_starts_with_many
  #   target_columns:
  #     - SCR_PE_PE_YN_QUEST
  #     - SCR_VS_VS_YN_QUEST
  #     - SCR_ECG_ECG_YN_QUEST
  #   prefix: "Да"
  #   skip_if_empty: false
  #   error_message: "Поля вопросов должны содержать только значение формата Да*"

  - id: BO dOFV процент в диапазоне при ответе да
    description: SCR_BO_RES_dOFV_PRC должен быть от 9 до 11.99, если SCR_BO_BO_YN_QUEST_ADD = Да*
    type: number_between
    target_column: SCR_BO_RES_dOFV_PRC
    min_value: 9
    max_value: 11.99
    skip_if_empty: false
    when:
      column: SCR_BO_BO_YN_QUEST_ADD
      operator: starts_with
      value: Да
    error_message: "SCR_BO_RES_dOFV_PRC должен быть от 9 до 11.99 при SCR_BO_BO_YN_QUEST_ADD = Да*"

  - id: BO вопрос значение да при dOFV add 9-11.99
    description: SCR_BO_BO_YN_QUEST_ADD должно быть Да*, если SCR_BO_RES_dOFV_PRC_ADD от 9 до 11.99
    type: text_starts_with
    target_column: SCR_BO_BO_YN_QUEST_ADD
    prefix: "Да"
    skip_if_empty: false
    when:
      column: SCR_BO_RES_dOFV_PRC_ADD
      operator: number_between
      value:
        min: 9
        max: 11.99
    error_message: "SCR_BO_BO_YN_QUEST_ADD должно быть Да* при SCR_BO_RES_dOFV_PRC_ADD от 9 до 11.99"

  - id: BO OFV FIR время заполнено при вопросе да
    description: SCR_BO_TIM_OFV_FIR_ADD должно быть заполнено, если SCR_BO_BO_YN_QUEST_ADD = Да*
    type: required_if
    target_column: SCR_BO_TIM_OFV_FIR_ADD
    when:
      column: SCR_BO_BO_YN_QUEST_ADD
      operator: starts_with
      value: Да
    error_message: "SCR_BO_TIM_OFV_FIR_ADD должно быть заполнено при SCR_BO_BO_YN_QUEST_ADD = Да*"

  - id: BO OFV FIR результат заполнен при вопросе да
    description: SCR_BO_RES_OFV_FIR_ADD должно быть заполнено, если SCR_BO_BO_YN_QUEST_ADD = Да*
    type: required_if
    target_column: SCR_BO_RES_OFV_FIR_ADD
    when:
      column: SCR_BO_BO_YN_QUEST_ADD
      operator: starts_with
      value: Да
    error_message: "SCR_BO_RES_OFV_FIR_ADD должно быть заполнено при SCR_BO_BO_YN_QUEST_ADD = Да*"

  - id: BO время ингаляции не раньше первого OFV
    description: SCR_BO_TIM_SALB_ADD должно быть >= SCR_BO_TIM_OFV_FIR_ADD, если SCR_BO_TIM_OFV_FIR_ADD не пусто
    type: time_greater_or_equal
    target_column: SCR_BO_TIM_SALB_ADD
    ref_column: SCR_BO_TIM_OFV_FIR_ADD
    skip_if_empty: false
    when:
      column: SCR_BO_TIM_OFV_FIR_ADD
      operator: is_not_empty
    error_message: "SCR_BO_TIM_SALB_ADD должно быть не раньше SCR_BO_TIM_OFV_FIR_ADD"

  - id: BO OFV SEC время 30-60 минут от первого
    description: SCR_BO_TIM_OFV_SEC_ADD должно быть в интервале 30..60 минут от SCR_BO_TIM_OFV_FIR_ADD, если SCR_BO_TIM_OFV_SEC_ADD не пусто
    type: time_between
    target_column: SCR_BO_TIM_OFV_SEC_ADD
    ref_column: SCR_BO_TIM_OFV_FIR_ADD
    min_minutes: 30
    max_minutes: 60
    skip_if_empty: false
    when:
      column: SCR_BO_TIM_OFV_SEC_ADD
      operator: is_not_empty
    error_message: "SCR_BO_TIM_OFV_SEC_ADD должно быть в интервале 30..60 минут от SCR_BO_TIM_OFV_FIR_ADD"

  - id: BO OFV SEC результат заполнен при вопросе да
    description: SCR_BO_RES_OFV_SEC_ADD должно быть заполнено, если SCR_BO_BO_YN_QUEST_ADD = Да*
    type: required_if
    target_column: SCR_BO_RES_OFV_SEC_ADD
    when:
      column: SCR_BO_BO_YN_QUEST_ADD
      operator: starts_with
      value: Да
    error_message: "SCR_BO_RES_OFV_SEC_ADD должно быть заполнено при SCR_BO_BO_YN_QUEST_ADD = Да*"

  - id: BO dOFV мл заполнено при вопросе да
    description: SCR_BO_RES_dOFV_ML_ADD должно быть заполнено, если SCR_BO_BO_YN_QUEST_ADD = Да*
    type: required_if
    target_column: SCR_BO_RES_dOFV_ML_ADD
    when:
      column: SCR_BO_BO_YN_QUEST_ADD
      operator: starts_with
      value: Да
    error_message: "SCR_BO_RES_dOFV_ML_ADD должно быть заполнено при SCR_BO_BO_YN_QUEST_ADD = Да*"

  - id: BO dOFV процент заполнено при вопросе да
    description: SCR_BO_RES_dOFV_PRC_ADD должно быть заполнено, если SCR_BO_BO_YN_QUEST_ADD = Да*
    type: required_if
    target_column: SCR_BO_RES_dOFV_PRC_ADD
    when:
      column: SCR_BO_BO_YN_QUEST_ADD
      operator: starts_with
      value: Да
    error_message: "SCR_BO_RES_dOFV_PRC_ADD должно быть заполнено при SCR_BO_BO_YN_QUEST_ADD = Да*"

  - id: возраст от 18 до 99
    description: SCR_DEMO_AGE возраст от 18
    type: number_between
    target_column: SCR_DEMO_AGE
    min_value: 18
    max_value: 99
    skip_if_empty: false
    error_message: "SCR_DEMO_AGE возраст от 18"

  - id: пол женский или мужской
    description: SCR_DEMO_SEX должен принимать только значения Женский или Мужской
    type: value_in
    target_column: SCR_DEMO_SEX
    allowed_values:
      - Женский
      - Мужской
    skip_if_empty: false
    error_message: "SCR_DEMO_SEX должен быть Женский или Мужской"

  - id: маммография для женщин значение да
    description: SCR_MAMM_MAMM_YN_QUEST должно быть Да, если SCR_DEMO_SEX = Женский
    type: value_in_if
    target_column: SCR_MAMM_MAMM_YN_QUEST
    allowed_values:
      - Да
    when:
      column: SCR_DEMO_SEX
      operator: equals
      value: Женский
    skip_if_empty: false
    error_message: "SCR_MAMM_MAMM_YN_QUEST должно быть Да, если SCR_DEMO_SEX = Женский"

  - id: маммография для мужчин не применимо
    description: SCR_MAMM_MAMM_YN_QUEST должно быть Не применимо, если SCR_DEMO_SEX = Мужской
    type: value_in_if
    target_column: SCR_MAMM_MAMM_YN_QUEST
    allowed_values:
      - Не применимо
    when:
      column: SCR_DEMO_SEX
      operator: equals
      value: Мужской
    skip_if_empty: false
    error_message: "SCR_MAMM_MAMM_YN_QUEST должно быть Не применимо, если SCR_DEMO_SEX = Мужской"

  - id: bmi заполнен
    description: SCR_DEMO_BMI должен быть заполнен
    type: not_empty
    target_column: SCR_DEMO_BMI
    error_message: "SCR_DEMO_BMI должен быть заполнен"

  - id: pack year пусто или не более 10
    description: SCR_SU_PACK_YEAR может быть пустым, либо должен быть <= 10
    type: number_less_or_equal
    target_column: SCR_SU_PACK_YEAR
    value: 10
    skip_if_empty: true
    error_message: "SCR_SU_PACK_YEAR должен быть пустым или иметь значение <= 10"

  - id: su drug значение нет
    description: SCR_SU_YN_DRUG должно быть Нет
    type: value_in
    target_column: SCR_SU_YN_DRUG
    allowed_values:
      - Нет
    skip_if_empty: false
    error_message: "SCR_SU_YN_DRUG должно быть Нет"

  - id: ФО вопрос значение да
    description: SCR_PE_PE_YN_QUEST должен иметь только значение формата Да*
    type: text_starts_with
    target_column: SCR_PE_PE_YN_QUEST
    prefix: "Да"
    skip_if_empty: false
    error_message: "SCR_PE_PE_YN_QUEST должен содержать только значение формата Да*"

  - id: ФО время не пустое
    description: SCR_PE_TIM должно быть заполнено
    type: not_empty
    target_column: SCR_PE_TIM
    error_message: "SCR_PE_TIM должно быть заполнено"

  - id: ФО общее состояние допустимые значения
    description: SCR_PE_ORRES_GENEX должен быть одним из допустимых значений
    type: value_in
    target_column: SCR_PE_ORRES_GENEX
    allowed_values:
      - Удовлетворительное
      - Средней тяжести
      - Тяжелое
      - Крайне тяжелое
      - Агональное
    skip_if_empty: false
    error_message: "SCR_PE_ORRES_GENEX содержит недопустимое значение"

  - id: ФО комментарий пустой при удовлетворительно
    description: SCR_PE_COMM_GENEX должен быть пустым, если SCR_PE_ORRES_GENEX = Удовлетворительно
    type: empty_if
    target_column: SCR_PE_COMM_GENEX
    when:
      column: SCR_PE_ORRES_GENEX
      operator: equals
      value: Удовлетворительное
    error_message: "SCR_PE_COMM_GENEX должен быть пустым при значении SCR_PE_ORRES_GENEX = Удовлетворительно"

  - id: ФО комментарий заполнен при не удовлетворительно
    description: SCR_PE_COMM_GENEX должен быть заполнен, если SCR_PE_ORRES_GENEX не равно Удовлетворительно
    type: required_if
    target_column: SCR_PE_COMM_GENEX
    when:
      column: SCR_PE_ORRES_GENEX
      operator: not_equals
      value: Удовлетворительно
    error_message: "SCR_PE_COMM_GENEX должен быть заполнен при значении SCR_PE_ORRES_GENEX отличном от Удовлетворительно"

  - id: ФО кожа и слизистые допустимые значения
    description: SCR_PE_ORRES_SKIN_MUCS должен быть одним из допустимых значений
    type: value_in
    target_column: SCR_PE_ORRES_SKIN_MUCS
    allowed_values:
      - Норма
      - Отклонение клинически незначимо*
      - Отклонение клинически значимо**
    skip_if_empty: false
    error_message: "SCR_PE_ORRES_SKIN_MUCS содержит недопустимое значение"

  - id: ФО комментарий кожа пустой при норма
    description: SCR_PE_COMM_SKIN_MUCS должен быть пустым, если SCR_PE_ORRES_SKIN_MUCS = Норма
    type: empty_if
    target_column: SCR_PE_COMM_SKIN_MUCS
    when:
      column: SCR_PE_ORRES_SKIN_MUCS
      operator: equals
      value: Норма
    error_message: "SCR_PE_COMM_SKIN_MUCS должен быть пустым при значении SCR_PE_ORRES_SKIN_MUCS = Норма"

  - id: ФО комментарий кожа заполнен при не норма
    description: SCR_PE_COMM_SKIN_MUCS должен быть заполнен, если SCR_PE_ORRES_SKIN_MUCS не равно Норма
    type: required_if
    target_column: SCR_PE_COMM_SKIN_MUCS
    when:
      column: SCR_PE_ORRES_SKIN_MUCS
      operator: not_equals
      value: Норма
    error_message: "SCR_PE_COMM_SKIN_MUCS должен быть заполнен при значении SCR_PE_ORRES_SKIN_MUCS отличном от Норма"

  - id: ФО дата не более 14 дней от скрининга
    description: SCR_PE_DAT не более 14 дней от SCR_ICF_DSSTDAT_ICFINV
    type: date_between
    target_column: SCR_PE_DAT
    ref_column: SCR_ICF_DSSTDAT_ICFINV
    min_days: 0
    max_days: 14
    date_format: "%Y-%m-%d"
    error_message: "SCR_PE_DAT должен быть в диапазоне 0..14 дней от SCR_ICF_DSSTDAT_ICFINV"

  - id: VS вопрос значение да
    description: SCR_VS_VS_YN_QUEST должен иметь только значение формата Да*
    type: text_starts_with
    target_column: SCR_VS_VS_YN_QUEST
    prefix: "Да"
    skip_if_empty: false
    error_message: "SCR_VS_VS_YN_QUEST должен содержать только значение формата Да*"

  - id: VS дата не более 14 дней от скрининга
    description: SCR_VS_DAT не более 14 дней от SCR_ICF_DSSTDAT_ICFINV
    type: date_between
    target_column: SCR_VS_DAT
    ref_column: SCR_ICF_DSSTDAT_ICFINV
    min_days: 0
    max_days: 14
    date_format: "%Y-%m-%d"
    error_message: "SCR_VS_DAT должен быть в диапазоне 0..14 дней от SCR_ICF_DSSTDAT_ICFINV"

  - id: VS время не пустое
    description: SCR_VS_TIM должно быть заполнено
    type: not_empty
    target_column: SCR_VS_TIM
    error_message: "SCR_VS_TIM должно быть заполнено"

  - id: VS температура не пустая
    description: SCR_VS_ORRES_TEMP должно быть заполнено
    type: not_empty
    target_column: SCR_VS_ORRES_TEMP
    error_message: "SCR_VS_ORRES_TEMP должно быть заполнено"

  - id: VS индикатор температуры норма
    description: SCR_VS_NRIND_TEMP должно быть Норма при SCR_VS_ORRES_TEMP 36.0..36.9
    type: value_in_if
    target_column: SCR_VS_NRIND_TEMP
    allowed_values:
      - Норма
    when:
      column: SCR_VS_ORRES_TEMP
      operator: number_between
      value:
        min: 36.0
        max: 36.9
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_TEMP должно быть Норма при SCR_VS_ORRES_TEMP 36.0..36.9"

  - id: VS индикатор температуры отклонение незначимо
    description: SCR_VS_NRIND_TEMP должно быть Отклонение клинически незначимо при SCR_VS_ORRES_TEMP 37.0..37.9
    type: value_in_if
    target_column: SCR_VS_NRIND_TEMP
    allowed_values:
      - Отклонение клинически незначимо
    when:
      column: SCR_VS_ORRES_TEMP
      operator: number_between
      value:
        min: 37.0
        max: 37.9
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_TEMP должно быть Отклонение клинически незначимо при SCR_VS_ORRES_TEMP 37.0..37.9"

  - id: VS индикатор температуры отклонение значимо
    description: SCR_VS_NRIND_TEMP должно быть Отклонение клинически значимо* при SCR_VS_ORRES_TEMP 38.0..39.9
    type: value_in_if
    target_column: SCR_VS_NRIND_TEMP
    allowed_values:
      - Отклонение клинически значимо*
    when:
      column: SCR_VS_ORRES_TEMP
      operator: number_between
      value:
        min: 38.0
        max: 39.9
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_TEMP должно быть Отклонение клинически значимо* при SCR_VS_ORRES_TEMP 38.0..39.9"

  - id: VS BPS не пустое
    description: SCR_VS_ORRES_BPS должно быть заполнено
    type: not_empty
    target_column: SCR_VS_ORRES_BPS
    error_message: "SCR_VS_ORRES_BPS должно быть заполнено"

  - id: VS индикатор BPS норма
    description: SCR_VS_NRIND_BPS должно быть Норма при SCR_VS_ORRES_BPS 100..129
    type: value_in_if
    target_column: SCR_VS_NRIND_BPS
    allowed_values:
      - Норма
    when:
      column: SCR_VS_ORRES_BPS
      operator: number_between
      value:
        min: 100
        max: 129
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPS должно быть Норма при SCR_VS_ORRES_BPS 100..129"

  - id: VS индикатор BPS отклонение незначимо
    description: SCR_VS_NRIND_BPS должно быть Отклонение клинически незначимо при SCR_VS_ORRES_BPS 130..159
    type: value_in_if
    target_column: SCR_VS_NRIND_BPS
    allowed_values:
      - Отклонение клинически незначимо
    when:
      column: SCR_VS_ORRES_BPS
      operator: number_between
      value:
        min: 130
        max: 159
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPS должно быть Отклонение клинически незначимо при SCR_VS_ORRES_BPS 130..159"

  - id: VS индикатор BPS отклонение значимо
    description: SCR_VS_NRIND_BPS должно быть Отклонение клинически значимо* при SCR_VS_ORRES_BPS 160..190
    type: value_in_if
    target_column: SCR_VS_NRIND_BPS
    allowed_values:
      - Отклонение клинически значимо*
    when:
      column: SCR_VS_ORRES_BPS
      operator: number_between
      value:
        min: 160
        max: 190
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPS должно быть Отклонение клинически значимо* при SCR_VS_ORRES_BPS 160..190"

  - id: VS BPD не пустое
    description: SCR_VS_ORRES_BPD должно быть заполнено
    type: not_empty
    target_column: SCR_VS_ORRES_BPD
    error_message: "SCR_VS_ORRES_BPD должно быть заполнено"

  - id: VS индикатор BPD норма
    description: SCR_VS_NRIND_BPD должно быть Норма при SCR_VS_ORRES_BPD 70..89
    type: value_in_if
    target_column: SCR_VS_NRIND_BPD
    allowed_values:
      - Норма
    when:
      column: SCR_VS_ORRES_BPD
      operator: number_between
      value:
        min: 70
        max: 89
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPD должно быть Норма при SCR_VS_ORRES_BPD 70..89"

  - id: VS индикатор BPD отклонение незначимо
    description: SCR_VS_NRIND_BPD должно быть Отклонение клинически незначимо при SCR_VS_ORRES_BPD 90..119
    type: value_in_if
    target_column: SCR_VS_NRIND_BPD
    allowed_values:
      - Отклонение клинически незначимо
    when:
      column: SCR_VS_ORRES_BPD
      operator: number_between
      value:
        min: 90
        max: 119
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPD должно быть Отклонение клинически незначимо при SCR_VS_ORRES_BPD 90..119"

  - id: VS индикатор BPD отклонение значимо
    description: SCR_VS_NRIND_BPD должно быть Отклонение клинически значимо* при SCR_VS_ORRES_BPD 120..150
    type: value_in_if
    target_column: SCR_VS_NRIND_BPD
    allowed_values:
      - Отклонение клинически значимо*
    when:
      column: SCR_VS_ORRES_BPD
      operator: number_between
      value:
        min: 120
        max: 150
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPD должно быть Отклонение клинически значимо* при SCR_VS_ORRES_BPD 120..150"

  - id: VS HR не пустое
    description: SCR_VS_ORRES_HR должно быть заполнено
    type: not_empty
    target_column: SCR_VS_ORRES_HR
    error_message: "SCR_VS_ORRES_HR должно быть заполнено"

  - id: VS индикатор HR норма
    description: SCR_VS_NRIND_HR должно быть Норма при SCR_VS_ORRES_HR 70..89
    type: value_in_if
    target_column: SCR_VS_NRIND_HR
    allowed_values:
      - Норма
    when:
      column: SCR_VS_ORRES_HR
      operator: number_between
      value:
        min: 70
        max: 89
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_HR должно быть Норма при SCR_VS_ORRES_HR 70..89"

  - id: VS индикатор HR отклонение незначимо
    description: SCR_VS_NRIND_HR должно быть Отклонение клинически незначимо при SCR_VS_ORRES_HR 90..119
    type: value_in_if
    target_column: SCR_VS_NRIND_HR
    allowed_values:
      - Отклонение клинически незначимо
      - Отклонение клинически значимо
    when:
      column: SCR_VS_ORRES_HR
      operator: number_between
      value:
        min: 90
        max: 119
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_HR должно быть Отклонение клинически незначимо при SCR_VS_ORRES_HR 90..119"

  - id: VS индикатор HR отклонение значимо
    description: SCR_VS_NRIND_HR должно быть Отклонение клинически значимо* при SCR_VS_ORRES_HR 120..150
    type: value_in_if
    target_column: SCR_VS_NRIND_HR
    allowed_values:
      - Отклонение клинически значимо*
    when:
      column: SCR_VS_ORRES_HR
      operator: number_between
      value:
        min: 120
        max: 150
