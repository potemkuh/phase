version: 1
defaults:
  date_format: "%Y-%m-%d"
  time_format: "%H:%M"

rules:
  # Пример групповой проверки "Да*" сразу для нескольких колонок.
  # Раскомментируйте, если хотите заменить однотипные одиночные правила.
  # - id: групповые вопросы значение да
  #   description: Набор вопросов должен иметь только значение формата Да*
  #   type: text_starts_with_many
  #   target_columns:
  #     - SCR_PE_PE_YN_QUEST
  #     - SCR_VS_VS_YN_QUEST
  #     - SCR_ECG_ECG_YN_QUEST
  #   prefix: "Да"
  #   skip_if_empty: false
  #   error_message: "Поля вопросов должны содержать только значение формата Да*"

  - id: возраст от 18 до 99
    description: SCR_DEMO_AGE возраст от 18
    type: number_between
    target_column: SCR_DEMO_AGE
    min_value: 18
    max_value: 99
    skip_if_empty: false
    error_message: "SCR_DEMO_AGE возраст от 18"

  - id: пол женский или мужской
    description: SCR_DEMO_SEX должен принимать только значения Женский или Мужской
    type: value_in
    target_column: SCR_DEMO_SEX
    allowed_values:
      - Женский
      - Мужской
    skip_if_empty: false
    error_message: "SCR_DEMO_SEX должен быть Женский или Мужской"

  - id: bmi заполнен
    description: SCR_DEMO_BMI должен быть заполнен
    type: not_empty
    target_column: SCR_DEMO_BMI
    error_message: "SCR_DEMO_BMI должен быть заполнен"

  - id: su drug значение нет
    description: SCR_SU_YN_DRUG должно быть Нет
    type: value_in
    target_column: SCR_SU_YN_DRUG
    allowed_values:
      - Нет
    skip_if_empty: false
    error_message: "SCR_SU_YN_DRUG должно быть Нет"

  - id: ФО вопрос значение да
    description: SCR_PE_PE_YN_QUEST должен иметь только значение формата Да*
    type: text_starts_with
    target_column: SCR_PE_PE_YN_QUEST
    prefix: "Да"
    skip_if_empty: false
    error_message: "SCR_PE_PE_YN_QUEST должен содержать только значение формата Да*"

  - id: ФО время не пустое
    description: SCR_PE_TIM должно быть заполнено
    type: not_empty
    target_column: SCR_PE_TIM
    error_message: "SCR_PE_TIM должно быть заполнено"

  - id: ФО дата не более 14 дней от скрининга
    description: SCR_PE_DAT не более 14 дней от SCR_ICF_DSSTDAT_ICFINV
    type: date_between
    target_column: SCR_PE_DAT
    ref_column: SCR_ICF_DSSTDAT_ICFINV
    min_days: 0
    max_days: 14
    date_format: "%Y-%m-%d"
    error_message: "SCR_PE_DAT должен быть в диапазоне 0..14 дней от SCR_ICF_DSSTDAT_ICFINV"

  - id: VS дата не более 14 дней от скрининга
    description: SCR_VS_DAT не более 14 дней от SCR_ICF_DSSTDAT_ICFINV
    type: date_between
    target_column: SCR_VS_DAT
    ref_column: SCR_ICF_DSSTDAT_ICFINV
    min_days: 0
    max_days: 14
    date_format: "%Y-%m-%d"
    error_message: "SCR_VS_DAT должен быть в диапазоне 0..14 дней от SCR_ICF_DSSTDAT_ICFINV"

  - id: VS время не пустое
    description: SCR_VS_TIM должно быть заполнено
    type: not_empty
    target_column: SCR_VS_TIM
    error_message: "SCR_VS_TIM должно быть заполнено"

  - id: VS температура не пустая
    description: SCR_VS_ORRES_TEMP должно быть заполнено
    type: not_empty
    target_column: SCR_VS_ORRES_TEMP
    error_message: "SCR_VS_ORRES_TEMP должно быть заполнено"

  - id: VS индикатор температуры норма
    description: SCR_VS_NRIND_TEMP должно быть Норма при SCR_VS_ORRES_TEMP 36.0..36.9
    type: value_in_if
    target_column: SCR_VS_NRIND_TEMP
    allowed_values:
      - Норма
    when:
      column: SCR_VS_ORRES_TEMP
      operator: number_between
      value:
        min: 36.0
        max: 36.9
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_TEMP должно быть Норма при SCR_VS_ORRES_TEMP 36.0..36.9"

  - id: VS индикатор температуры отклонение незначимо
    description: SCR_VS_NRIND_TEMP должно быть Отклонение клинически незначимо при SCR_VS_ORRES_TEMP 37.0..37.9
    type: value_in_if
    target_column: SCR_VS_NRIND_TEMP
    allowed_values:
      - Отклонение клинически незначимо
    when:
      column: SCR_VS_ORRES_TEMP
      operator: number_between
      value:
        min: 37.0
        max: 37.9
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_TEMP должно быть Отклонение клинически незначимо при SCR_VS_ORRES_TEMP 37.0..37.9"

  - id: VS индикатор температуры отклонение значимо
    description: SCR_VS_NRIND_TEMP должно быть Отклонение клинически значимо* при SCR_VS_ORRES_TEMP 38.0..39.9
    type: value_in_if
    target_column: SCR_VS_NRIND_TEMP
    allowed_values:
      - Отклонение клинически значимо*
    when:
      column: SCR_VS_ORRES_TEMP
      operator: number_between
      value:
        min: 38.0
        max: 39.9
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_TEMP должно быть Отклонение клинически значимо* при SCR_VS_ORRES_TEMP 38.0..39.9"

  - id: VS BPS не пустое
    description: SCR_VS_ORRES_BPS должно быть заполнено
    type: not_empty
    target_column: SCR_VS_ORRES_BPS
    error_message: "SCR_VS_ORRES_BPS должно быть заполнено"

  - id: VS индикатор BPS норма
    description: SCR_VS_NRIND_BPS должно быть Норма при SCR_VS_ORRES_BPS 100..129
    type: value_in_if
    target_column: SCR_VS_NRIND_BPS
    allowed_values:
      - Норма
    when:
      column: SCR_VS_ORRES_BPS
      operator: number_between
      value:
        min: 100
        max: 129
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPS должно быть Норма при SCR_VS_ORRES_BPS 100..129"

  - id: VS индикатор BPS отклонение незначимо
    description: SCR_VS_NRIND_BPS должно быть Отклонение клинически незначимо при SCR_VS_ORRES_BPS 130..159
    type: value_in_if
    target_column: SCR_VS_NRIND_BPS
    allowed_values:
      - Отклонение клинически незначимо
    when:
      column: SCR_VS_ORRES_BPS
      operator: number_between
      value:
        min: 130
        max: 159
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPS должно быть Отклонение клинически незначимо при SCR_VS_ORRES_BPS 130..159"

  - id: VS индикатор BPS отклонение значимо
    description: SCR_VS_NRIND_BPS должно быть Отклонение клинически значимо* при SCR_VS_ORRES_BPS 160..190
    type: value_in_if
    target_column: SCR_VS_NRIND_BPS
    allowed_values:
      - Отклонение клинически значимо*
    when:
      column: SCR_VS_ORRES_BPS
      operator: number_between
      value:
        min: 160
        max: 190
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPS должно быть Отклонение клинически значимо* при SCR_VS_ORRES_BPS 160..190"

  - id: VS BPD не пустое
    description: SCR_VS_ORRES_BPD должно быть заполнено
    type: not_empty
    target_column: SCR_VS_ORRES_BPD
    error_message: "SCR_VS_ORRES_BPD должно быть заполнено"

  - id: VS индикатор BPD норма
    description: SCR_VS_NRIND_BPD должно быть Норма при SCR_VS_ORRES_BPD 70..89
    type: value_in_if
    target_column: SCR_VS_NRIND_BPD
    allowed_values:
      - Норма
    when:
      column: SCR_VS_ORRES_BPD
      operator: number_between
      value:
        min: 70
        max: 89
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPD должно быть Норма при SCR_VS_ORRES_BPD 70..89"

  - id: VS индикатор BPD отклонение незначимо
    description: SCR_VS_NRIND_BPD должно быть Отклонение клинически незначимо при SCR_VS_ORRES_BPD 90..119
    type: value_in_if
    target_column: SCR_VS_NRIND_BPD
    allowed_values:
      - Отклонение клинически незначимо
    when:
      column: SCR_VS_ORRES_BPD
      operator: number_between
      value:
        min: 90
        max: 119
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPD должно быть Отклонение клинически незначимо при SCR_VS_ORRES_BPD 90..119"

  - id: VS индикатор BPD отклонение значимо
    description: SCR_VS_NRIND_BPD должно быть Отклонение клинически значимо* при SCR_VS_ORRES_BPD 120..150
    type: value_in_if
    target_column: SCR_VS_NRIND_BPD
    allowed_values:
      - Отклонение клинически значимо*
    when:
      column: SCR_VS_ORRES_BPD
      operator: number_between
      value:
        min: 120
        max: 150
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_BPD должно быть Отклонение клинически значимо* при SCR_VS_ORRES_BPD 120..150"

  - id: VS HR не пустое
    description: SCR_VS_ORRES_HR должно быть заполнено
    type: not_empty
    target_column: SCR_VS_ORRES_HR
    error_message: "SCR_VS_ORRES_HR должно быть заполнено"

  - id: VS индикатор HR норма
    description: SCR_VS_NRIND_HR должно быть Норма при SCR_VS_ORRES_HR 70..89
    type: value_in_if
    target_column: SCR_VS_NRIND_HR
    allowed_values:
      - Норма
    when:
      column: SCR_VS_ORRES_HR
      operator: number_between
      value:
        min: 70
        max: 89
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_HR должно быть Норма при SCR_VS_ORRES_HR 70..89"

  - id: VS индикатор HR отклонение незначимо
    description: SCR_VS_NRIND_HR должно быть Отклонение клинически незначимо при SCR_VS_ORRES_HR 90..119
    type: value_in_if
    target_column: SCR_VS_NRIND_HR
    allowed_values:
      - Отклонение клинически незначимо
      - Отклонение клинически значимо
    when:
      column: SCR_VS_ORRES_HR
      operator: number_between
      value:
        min: 90
        max: 119
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_HR должно быть Отклонение клинически незначимо при SCR_VS_ORRES_HR 90..119"

  - id: VS индикатор HR отклонение значимо
    description: SCR_VS_NRIND_HR должно быть Отклонение клинически значимо* при SCR_VS_ORRES_HR 120..150
    type: value_in_if
    target_column: SCR_VS_NRIND_HR
    allowed_values:
      - Отклонение клинически значимо*
    when:
      column: SCR_VS_ORRES_HR
      operator: number_between
      value:
        min: 120
        max: 150
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_HR должно быть Отклонение клинически значимо* при SCR_VS_ORRES_HR 120..150"

  - id: VS RR не пустое
    description: SCR_VS_ORRES_RR должно быть заполнено
    type: not_empty
    target_column: SCR_VS_ORRES_RR
    error_message: "SCR_VS_ORRES_RR должно быть заполнено"


  - id: VS индикатор RR норма
    description: SCR_VS_NRIND_RR должно быть Норма при SCR_VS_ORRES_RR 14..18
    type: value_in_if
    target_column: SCR_VS_NRIND_RR
    allowed_values:
      - Норма
    when:
      column: SCR_VS_ORRES_RR
      operator: number_between
      value:
        min: 14
        max: 18
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_RR должно быть Норма при SCR_VS_ORRES_RR 14..18"

  - id: VS индикатор RR отклонение незначимо
    description: SCR_VS_NRIND_RR должно быть Отклонение клинически незначимо при SCR_VS_ORRES_RR 19..22
    type: value_in_if
    target_column: SCR_VS_NRIND_RR
    allowed_values:
      - Отклонение клинически незначимо
    when:
      column: SCR_VS_ORRES_RR
      operator: number_between
      value:
        min: 19
        max: 22
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_RR должно быть Отклонение клинически незначимо при SCR_VS_ORRES_RR 19..22"

  - id: VS индикатор RR отклонение значимо
    description: SCR_VS_NRIND_RR должно быть Отклонение клинически значимо* при SCR_VS_ORRES_RR 23..30
    type: value_in_if
    target_column: SCR_VS_NRIND_RR
    allowed_values:
      - Отклонение клинически значимо*
    when:
      column: SCR_VS_ORRES_RR
      operator: number_between
      value:
        min: 23
        max: 30
    skip_if_empty: false
    error_message: "SCR_VS_NRIND_RR должно быть Отклонение клинически значимо* при SCR_VS_ORRES_RR 23..30"

  - id: ЭКГ вопрос значение да
    description: SCR_ECG_ECG_YN_QUEST должен иметь только значение формата Да*
    type: text_starts_with
    target_column: SCR_ECG_ECG_YN_QUEST
    prefix: "Да"
    skip_if_empty: false
    error_message: "SCR_ECG_ECG_YN_QUEST должен содержать только значение формата Да*"

  - id: ЭКГ дата не более 14 дней от скрининга
    description: SCR_ECG_DAT не более 14 дней от SCR_ICF_DSSTDAT_ICFINV
    type: date_between
    target_column: SCR_ECG_DAT
    ref_column: SCR_ICF_DSSTDAT_ICFINV
    min_days: 0
    max_days: 14
    date_format: "%Y-%m-%d"
    error_message: "SCR_ECG_DAT должен быть в диапазоне 0..14 дней от SCR_ICF_DSSTDAT_ICFINV"

  - id: ЭКГ время не пустое
    description: SCR_ECG_TIM должно быть заполнено
    type: not_empty
    target_column: SCR_ECG_TIM
    error_message: "SCR_ECG_TIM должно быть заполнено"

  - id: ЭКГ результат допустимые значения
    description: SCR_ECG_ORRES_ECG должен быть одним из допустимых значений
    type: value_in
    target_column: SCR_ECG_ORRES_ECG
    allowed_values:
      - Норма
      - Отклонение клинически значимо*/**
      - Отклонение клинически незначимо*
    skip_if_empty: false
    error_message: "SCR_ECG_ORRES_ECG содержит недопустимое значение"

  - id: ЭКГ комментарий пустой при норма
    description: SCR_ECG_COMM должен быть пустым, если SCR_ECG_ORRES_ECG = Норма
    type: empty_if
    target_column: SCR_ECG_COMM
    when:
      column: SCR_ECG_ORRES_ECG
      operator: equals
      value: Норма
    error_message: "SCR_ECG_COMM должен быть пустым при значении SCR_ECG_ORRES_ECG = Норма"

  - id: ЭКГ комментарий заполнен при не норма
    description: SCR_ECG_COMM должен быть заполнен, если SCR_ECG_ORRES_ECG не равно Норма
    type: required_if
    target_column: SCR_ECG_COMM
    when:
      column: SCR_ECG_ORRES_ECG
      operator: not_equals
      value: Норма
    error_message: "SCR_ECG_COMM должен быть заполнен при значении SCR_ECG_ORRES_ECG отличном от Норма"

  - id: дата подписания врачом и пациентом должны совпадать
    description: SCR_ICF_DSSTDAT_ICFPAT должна быть равна SCR_ICF_DSSTDAT_ICFINV
    type: date_equal
    main_column: SCR_ICF_DSSTDAT_ICFPAT
    comparative_columns:
      - SCR_ICF_DSSTDAT_ICFINV
    date_format: "%Y-%m-%d"
    error_message: "SCR_ICF_DSSTDAT_ICFPAT должна быть равна SCR_ICF_DSSTDAT_ICFINV"

  - id: время подписи врача больше времени подписи пациента
    description: SCR_ICF_DSSTTIM_ICFINV должно быть больше SCR_ICF_DSSTTIM_ICFPAT
    type: time_between
    target_column: SCR_ICF_DSSTTIM_ICFINV
    ref_column: SCR_ICF_DSSTTIM_ICFPAT
    min_minutes: 1
    max_minutes: 60
    when:
      column: SCR_ICF_DSSTDAT_ICFPAT
      operator: equals_column
      value: SCR_ICF_DSSTDAT_ICFINV
    error_message: "SCR_ICF_DSSTTIM_ICFINV должно быть больше SCR_ICF_DSSTTIM_ICFPAT"

  - id: icf подписано значение да
    description: SCR_ICF_YN_ICFSIGN должно быть Да
    type: value_in
    target_column: SCR_ICF_YN_ICFSIGN
    allowed_values:
      - Да
    skip_if_empty: false
    error_message: "SCR_ICF_YN_ICFSIGN должно быть Да"

  - id: icf ipor значение да
    description: SCR_ICF_YN_IPOR должно быть Да
    type: value_in
    target_column: SCR_ICF_YN_IPOR
    allowed_values:
      - Да
    skip_if_empty: false
    error_message: "SCR_ICF_YN_IPOR должно быть Да"

  - id: icf icfor значение да
    description: SCR_ICF_YN_ICFOR должно быть Да
    type: value_in
    target_column: SCR_ICF_YN_ICFOR
    allowed_values:
      - Да
    skip_if_empty: false
    error_message: "SCR_ICF_YN_ICFOR должно быть Да"

  - id: скрининговый визит в диапазоне 0-14 дней от даты подписи ICF
    description: SCR_SV_VISDAT должен быть в диапазоне 0..14 дней от SCR_ICF_DSSTDAT_ICFINV
    type: date_between
    target_column: SCR_SV_VISDAT
    ref_column: SCR_ICF_DSSTDAT_ICFINV
    min_days: 0
    max_days: 14
    date_format: "%Y-%m-%d"
    error_message: "SCR_SV_VISDAT должен быть в диапазоне 0..14 дней от SCR_ICF_DSSTDAT_ICFINV"

  - id: 1 визит не позднее 14 дней от даты скрининга
    description: P1_D1_SV_VISDAT не позднее 14 дней от SCR_ICF_DSSTDAT_ICFINV
    type: date_between
    target_column: P1_D1_SV_VISDAT
    ref_column: SCR_ICF_DSSTDAT_ICFINV
    min_days: 0
    max_days: 14
    date_format: "%Y-%m-%d"
    error_message: "P1_D1_SV_VISDAT должен быть в диапазоне 0..14 дней от SCR_ICF_DSSTDAT_ICFINV"


  - id: Поле не пустое
    description: "Поле обязательно к заполнению"
    type: not_empty
    target_columns:
      - SCR_DEMO_SEX
      - SCR_DEMO_BRTHDAT
      - SCR_DEMO_HEIGHT
      - SCR_DEMO_WEIGHT
      - SCR_PE_TIM
      - SCR_VS_TIM
      - SCR_ECG_TIM
      - SCR_DEMO_BMI
    error_message: "Поле должно быть заполнено"